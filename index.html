<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit or Game? - IP-callservice</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
        }

        .container {
            text-align: center;
        }

        /* ルーレットの外枠 */
        .wheel-container {
            position: relative;
            width: 300px;
            height: 300px;
            margin-bottom: 30px;
        }

        /* 矢印 */
        .arrow {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 30px solid #ff4757;
            z-index: 10;
        }

        /* 円盤本体 */
        .wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 5px solid #333;
            position: relative;
            overflow: hidden;
            transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1);
            background: conic-gradient(
                #3498db 0deg 180deg, 
                #2ecc71 180deg 360deg
            );
        }

        /* ラベルの配置 */
        .label {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            font-size: 24px;
        }

        .label-edit { transform: rotate(90deg) translateY(-70px); }
        .label-game { transform: rotate(270deg) translateY(-70px); }

        button {
            padding: 12px 30px;
            font-size: 18px;
            cursor: pointer;
            background-color: #333;
            color: white;
            border: none;
            border-radius: 5px;
            transition: 0.2s;
        }

        button:hover { background-color: #555; }
        button:disabled { background-color: #ccc; }

        #result {
            margin-top: 20px;
            font-size: 24px;
            font-weight: bold;
            min-height: 1.2em;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>運命の選択</h1>
    <div class="wheel-container">
        <div class="arrow"></div>
        <div id="wheel" class="wheel">
            <div class="label label-edit">編集 (Edit)</div>
            <div id="game-label" class="label label-game">ゲーム (Game)</div>
        </div>
    </div>
    <button id="spin-btn">ルーレットを回す！</button>
    <div id="result"></div>
</div>

<script>
    const wheel = document.getElementById('wheel');
    const btn = document.getElementById('spin-btn');
    const resultDiv = document.getElementById('result');

    let currentRotation = 0;

    btn.addEventListener('click', () => {
        btn.disabled = true;
        resultDiv.textContent = "運命を選んでいます...";

        // 5回転(1800度)以上回して勢いを出す
        const extraDegree = Math.floor(Math.random() * 360);
        currentRotation += 1800 + extraDegree;
        
        wheel.style.transform = `rotate(${currentRotation}deg)`;

        // アニメーション終了後に判定（4秒）
        setTimeout(() => {
            btn.disabled = false;
            
            // 現在の角度からどちらが上（270度付近）にあるか判定
            const finalDegree = currentRotation % 360;
            
            // 0-180が「ゲーム」、180-360が「編集」の設定（CSSのグラデ準拠）
            // ※矢印の位置や回転方向で微調整が必要ですが、直感的な判定にします
            if (finalDegree <= 180) {
                resultDiv.textContent = "結果：🎮 ゲームしましょう！";
                resultDiv.style.color = "#2ecc71";
            } else {
                resultDiv.textContent = "結果：💻 編集（仕事）の時間です！";
                resultDiv.style.color = "#3498db";
            }
        }, 4000);
    });
</script>

</body>
</html>
